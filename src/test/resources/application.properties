# ============================================================================
# Config exclusiva de TESTS. Spring la toma en lugar de src/main/resources al
# correr `mvn test`, así los @SpringBootTest NUNCA tocan la base productiva.
# (Antes los tests insertaban insignias/misiones de prueba en el Postgres real.)
# ============================================================================

# Base H2 en memoria, descartable (se crea y se borra en cada corrida).
spring.datasource.url=jdbc:h2:mem:incentivos_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Datadog desactivado en tests (no exporta métricas ni necesita api-key).
management.datadog.metrics.export.enabled=false

# URLs de los otros componentes (las usan los tests de controllers de integración).
DONADORES_Y_ENTIDADES=https://donadoresyentidades.onrender.com
DONACIONES_SERVICE_URL=https://donaciones-b4cs.onrender.com

# Puerto aleatorio para no chocar con una instancia local levantada.
server.port=0
